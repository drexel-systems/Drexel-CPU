<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#07294D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD740;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC600;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" fill="#07294D" rx="12"/>

  <!-- Subtle circuit board trace lines -->
  <g stroke="#0d3d72" stroke-width="1.5" fill="none" opacity="0.7">
    <!-- Horizontal traces -->
    <line x1="0" y1="30" x2="60" y2="30"/>
    <line x1="0" y1="55" x2="45" y2="55"/>
    <line x1="0" y1="80" x2="45" y2="80"/>
    <line x1="0" y1="105" x2="60" y2="105"/>
    <line x1="0" y1="130" x2="45" y2="130"/>
    <line x1="175" y1="30" x2="240" y2="30"/>
    <line x1="175" y1="55" x2="240" y2="55"/>
    <line x1="175" y1="80" x2="240" y2="80"/>
    <line x1="175" y1="105" x2="240" y2="105"/>
    <line x1="175" y1="130" x2="240" y2="130"/>
    <!-- Vertical connectors left -->
    <line x1="45" y1="30" x2="45" y2="55"/>
    <line x1="60" y1="55" x2="60" y2="30"/>
    <line x1="45" y1="80" x2="45" y2="105"/>
    <line x1="60" y1="105" x2="60" y2="130"/>
    <!-- Vertical connectors right -->
    <line x1="195" y1="30" x2="195" y2="55"/>
    <line x1="210" y1="55" x2="210" y2="80"/>
    <line x1="195" y1="80" x2="195" y2="105"/>
    <line x1="210" y1="105" x2="210" y2="130"/>
    <!-- Via dots left -->
    <circle cx="45" cy="55" r="3" fill="#0d3d72"/>
    <circle cx="60" cy="30" r="3" fill="#0d3d72"/>
    <circle cx="45" cy="105" r="3" fill="#0d3d72"/>
    <circle cx="60" cy="130" r="3" fill="#0d3d72"/>
    <!-- Via dots right -->
    <circle cx="195" cy="55" r="3" fill="#0d3d72"/>
    <circle cx="210" cy="80" r="3" fill="#0d3d72"/>
    <circle cx="195" cy="105" r="3" fill="#0d3d72"/>
    <circle cx="210" cy="130" r="3" fill="#0d3d72"/>
  </g>

  <!-- CPU Chip body -->
  <rect x="62" y="22" width="113" height="116" rx="6" fill="url(#chipGrad)" stroke="#FFC600" stroke-width="2"/>
  <!-- Inner die -->
  <rect x="72" y="32" width="93" height="96" rx="3" fill="#051e38"/>
  <!-- Die grid lines -->
  <g stroke="#0d3d72" stroke-width="0.75" opacity="0.8">
    <line x1="72" y1="64" x2="165" y2="64"/>
    <line x1="72" y1="96" x2="165" y2="96"/>
    <line x1="104" y1="32" x2="104" y2="128"/>
    <line x1="134" y1="32" x2="134" y2="128"/>
  </g>
  <!-- Core blocks on die -->
  <rect x="76" y="36" width="24" height="24" rx="2" fill="#0f4a7a" stroke="#1a6bad" stroke-width="0.75"/>
  <rect x="104" y="36" width="26" height="24" rx="2" fill="#0f4a7a" stroke="#1a6bad" stroke-width="0.75"/>
  <rect x="134" y="36" width="27" height="24" rx="2" fill="#0f4a7a" stroke="#1a6bad" stroke-width="0.75"/>
  <rect x="76" y="68" width="26" height="24" rx="2" fill="#0f4a7a" stroke="#1a6bad" stroke-width="0.75"/>
  <rect x="107" y="68" width="54" height="24" rx="2" fill="#133d66" stroke="#1a6bad" stroke-width="0.75"/>
  <rect x="76" y="100" width="85" height="24" rx="2" fill="#0a3560" stroke="#1a6bad" stroke-width="0.75"/>

  <!-- Gold chip pins - left side -->
  <g fill="url(#goldGrad)">
    <rect x="54" y="30" width="8" height="5" rx="1"/>
    <rect x="54" y="42" width="8" height="5" rx="1"/>
    <rect x="54" y="54" width="8" height="5" rx="1"/>
    <rect x="54" y="66" width="8" height="5" rx="1"/>
    <rect x="54" y="78" width="8" height="5" rx="1"/>
    <rect x="54" y="90" width="8" height="5" rx="1"/>
    <rect x="54" y="102" width="8" height="5" rx="1"/>
    <rect x="54" y="114" width="8" height="5" rx="1"/>
    <rect x="54" y="126" width="8" height="5" rx="1"/>
  </g>
  <!-- Gold chip pins - right side -->
  <g fill="url(#goldGrad)">
    <rect x="175" y="30" width="8" height="5" rx="1"/>
    <rect x="175" y="42" width="8" height="5" rx="1"/>
    <rect x="175" y="54" width="8" height="5" rx="1"/>
    <rect x="175" y="66" width="8" height="5" rx="1"/>
    <rect x="175" y="78" width="8" height="5" rx="1"/>
    <rect x="175" y="90" width="8" height="5" rx="1"/>
    <rect x="175" y="102" width="8" height="5" rx="1"/>
    <rect x="175" y="114" width="8" height="5" rx="1"/>
    <rect x="175" y="126" width="8" height="5" rx="1"/>
  </g>
  <!-- Gold chip pins - top -->
  <g fill="url(#goldGrad)">
    <rect x="74" y="14" width="5" height="8" rx="1"/>
    <rect x="88" y="14" width="5" height="8" rx="1"/>
    <rect x="102" y="14" width="5" height="8" rx="1"/>
    <rect x="116" y="14" width="5" height="8" rx="1"/>
    <rect x="130" y="14" width="5" height="8" rx="1"/>
    <rect x="144" y="14" width="5" height="8" rx="1"/>
    <rect x="158" y="14" width="5" height="8" rx="1"/>
  </g>
  <!-- Gold chip pins - bottom -->
  <g fill="url(#goldGrad)">
    <rect x="74" y="138" width="5" height="8" rx="1"/>
    <rect x="88" y="138" width="5" height="8" rx="1"/>
    <rect x="102" y="138" width="5" height="8" rx="1"/>
    <rect x="116" y="138" width="5" height="8" rx="1"/>
    <rect x="130" y="138" width="5" height="8" rx="1"/>
    <rect x="144" y="138" width="5" height="8" rx="1"/>
    <rect x="158" y="138" width="5" height="8" rx="1"/>
  </g>

  <!-- Pin 1 indicator -->
  <circle cx="69" cy="28" r="3" fill="#FFC600" opacity="0.9"/>

  <!-- RISC-V label on die -->
  <text x="118" y="54" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFC600" font-weight="bold" filter="url(#glow)">RISC-V</text>
  <text x="118" y="63" text-anchor="middle" font-family="monospace" font-size="6" fill="#7fb3d3">RV32IM</text>

  <!-- CS281 label below die blocks -->
  <text x="118" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFC600" font-weight="bold">CS281</text>

  <!-- Right side: project title text -->
  <text x="258" y="58" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF" letter-spacing="1">CS281</text>
  <text x="258" y="82" font-family="Arial, sans-serif" font-size="11" fill="#FFC600" letter-spacing="3">VIRTUAL DEV BOARD</text>
  <!-- Divider line -->
  <line x1="258" y1="92" x2="460" y2="92" stroke="#FFC600" stroke-width="1.5" opacity="0.6"/>
  <text x="258" y="110" font-family="Arial, sans-serif" font-size="11" fill="#a8c8e8">Systems Architecture</text>
  <text x="258" y="128" font-family="Arial, sans-serif" font-size="11" fill="#a8c8e8">Drexel University</text>
  <!-- Powered by Renode badge -->
  <rect x="258" y="138" width="110" height="14" rx="3" fill="#0d3d72" opacity="0.8"/>
  <text x="263" y="149" font-family="monospace" font-size="8" fill="#7fb3d3">powered by </text>
  <text x="331" y="149" font-family="monospace" font-size="8" fill="#FFC600" font-weight="bold">Renode</text>
</svg>
